<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="/static/registro_styles.css">
</head>
<body>

    <div class="contenedor-formulario-registro">
        <form class="formulario" method="post" action="/registro">
            <h1 class="form-title">Formulario de Registro</h1>
            <label for="email">Correo electrónico </label>
            <input class="input correo" type="email" id="email" name="email" required placeholder="tareas@registro.com">
            <label for="password">Contraseña</label>
            <input class="input pass1" type="password" id="password" name="password" required placeholder="contraseña">
            <label for="password-verification">Verificar Constraseña</label>
            <input class="input pass2" type="password" id="password-verification" name="password-verification" required placeholder="Confirmar contraseña">
            <input class="submit" type="submit" name="submit" id="submit">
        </form>
    </div>
    
</body>
</html>
